upstream django {
    server kolco24_django:8000;
}

server {
    listen 80;
    client_max_body_size 50m;

    # Resolve the real client IP when requests arrive through the external reverse
    # proxy in the Docker "proxy" network (docker-compose_v2.yml).  Without this,
    # $remote_addr is the upstream proxy's internal Docker IP, so X-Real-IP would
    # be that same proxy IP and all clients would collapse into one throttle bucket.
    # The real_ip module replaces $remote_addr with the actual client IP extracted
    # from X-Forwarded-For, trusting only headers forwarded by the upstream proxy.
    #
    # TRUSTED_PROXY_CIDR must be set to the proxy container's IP or its network
    # CIDR — never broader than necessary.  Find the actual value with:
    #   docker network inspect proxy | grep Subnet
    # or use the proxy container's specific IP (e.g. 172.18.0.2/32) for the
    # tightest isolation.  Trusting a broad range lets any container in that range
    # forge X-Forwarded-For and spoof the throttle key.
    set_real_ip_from ${TRUSTED_PROXY_CIDR};
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    location /static/ {
        alias /app/staticfiles/;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        # After real_ip resolution, $remote_addr is the actual client IP.
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
