{% extends "website/base-2.html" %}

{% block title %}{% if is_create %}Создание гонки{% else %}Редактирование гонки{% endif %} — Кольцо 24{% endblock %}

{% block content %}
<div class="race-form-page">
  <h1>{% if is_create %}Создание гонки{% else %}Редактирование гонки{% endif %}</h1>

  <form method="post">
    {% csrf_token %}
    <input type="hidden" name="categories_json">
    <input type="hidden" name="price_tiers_json">
    <button type="submit">Сохранить</button>
  </form>

  <script id="categories-data" type="application/json">{{ categories_data }}</script>
  <script id="price-tiers-data" type="application/json">{{ price_tiers_data }}</script>
</div>
{% endblock %}
