<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Что-то сломалось · Кольцо 24</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/static/css/theme-2.css" rel="stylesheet" type="text/css">
    <link href="/static/css/error.css" rel="stylesheet" type="text/css">
    <link href="/static/favicon.ico" rel="shortcut icon" type="image/png">
</head>
<body>
<header class="error-nav">
    <div class="container error-nav-inner">
        <a class="brand" href="/">
            <img src="/static/images/logo.png" alt="Кольцо 24">
            <span>Кольцо&nbsp;24</span>
        </a>
    </div>
</header>

<main class="page error-page is-500">
    <div class="error-inner">
        <span class="error-eyebrow">
            <span class="code">Сбой на дистанции</span>
            <span class="dot"></span>
            <span>Ошибка 500</span>
        </span>

        <svg class="error-art" viewBox="0 0 120 120" fill="none"
             xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="60" cy="60" r="40" stroke="currentColor" stroke-width="6"/>
            <path d="M60 36v24l16 12" stroke="currentColor" stroke-width="6"
                  stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="60" cy="60" r="5" fill="currentColor"/>
        </svg>

        <div class="error-code">500</div>
        <h1>Что-то сломалось на дистанции</h1>
        <p class="sub">Мы уже разбираемся. Попробуйте обновить страницу чуть позже.</p>

        <div class="error-actions">
            <a class="btn btn-primary btn-lg" href="/">На главную</a>
        </div>
    </div>
</main>
</body>
</html>
