{% extends "website/base-2.html" %}
{% load static %}

{% block title %}Доступ закрыт · Кольцо 24{% endblock %}

{% block extra_head %}
<link href="{% static 'css/error.css' %}" rel="stylesheet" type="text/css">
{% endblock %}

{% block content %}
<main class="page error-page">
    <div class="error-inner">
        <span class="error-eyebrow">
            <span class="code">Судья на КП</span>
            <span class="dot"></span>
            <span>Ошибка 403</span>
        </span>

        <svg class="error-art" viewBox="0 0 120 120" fill="none"
             xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="60" cy="60" r="40" stroke="currentColor" stroke-width="6"/>
            <path d="M60 36v24l16 12" stroke="currentColor" stroke-width="6"
                  stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="60" cy="60" r="5" fill="currentColor"/>
        </svg>

        <div class="error-code">403</div>
        <h1>Доступ закрыт</h1>
        <p class="sub">У этого КП стоит судья — сюда вам нельзя.</p>

        <div class="error-actions">
            <a class="btn btn-primary btn-lg" href="/">На главную</a>
        </div>
    </div>
</main>
{% endblock %}
