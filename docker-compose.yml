version: '3'
services:
  kolco24_web:
    build: .
    container_name: kolco24_django
    restart: unless-stopped
    user: "1000:1000"
    command: [ "gunicorn", "--bind", "0.0.0.0:8000", "config.wsgi:application", "--access-logfile", "-", "--log-level", "info" ]
    env_file:
      - .env
    volumes:
      - ./src:/app
    depends_on:
      - kolco24_db
    networks:
      - kolco24_default

  kolco24_nginx:
    image: nginx:alpine
    container_name: kolco24_nginx
    restart: unless-stopped
    environment:
      TRUSTED_PROXY_CIDR: "${TRUSTED_PROXY_CIDR:-127.0.0.1/32}"
    volumes:
      - ./src/staticfiles:/app/staticfiles:ro
      - ./src/media:/app/media:ro
      - ./deploy/nginx.conf:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      - kolco24_web
    networks:
      - nginx_network
      - kolco24_default

  kolco24_runmailer:
    build: .
    container_name: kolco24_runmailer
    restart: unless-stopped
    command: [ "python", "manage.py", "runmailer" ]
    env_file:
      - .env
    volumes:
      - ./src:/app
    depends_on:
      - kolco24_db
    networks:
      - kolco24_default

  kolco24_vtb_checker:
    build: .
    container_name: kolco24_vtb_checker
    restart: unless-stopped
    command: [ "python", "manage.py", "check_vtb_payments" ]
    env_file:
      - .env
    volumes:
      - ./src:/app
    depends_on:
      - kolco24_db
    networks:
      - kolco24_default

  kolco24_db:
    image: postgres:14
    container_name: kolco24_db
    restart: unless-stopped
    ports:
      - "9995:5432"
    environment:
      POSTGRES_DB: kolco24
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - kolco24_db:/var/lib/postgresql/data
    networks:
      - kolco24_default

networks:
  kolco24_default:
  nginx_network:
    external: true

volumes:
  kolco24_db: